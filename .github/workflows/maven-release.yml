name: Maven Central Release

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: silent
            profile: silent-build
          - variant: full
            profile: full-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Import GPG Key
        run: |
          echo "${{ secrets.MAVEN_GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf

      - name: Prepare release artifactId (${{ matrix.variant }})
        run: |
          artifact_id="open-translator-lite-${{ matrix.variant }}"
          sed -i "0,/<artifactId>open-translator-lite<\\/artifactId>/s//<artifactId>${artifact_id}<\\/artifactId>/" pom.xml

      - name: Deploy to Maven Central (${{ matrix.variant }})
        run: |
          mvn clean deploy -B \
            -P${{ matrix.profile }} \
            -DskipTests \
            -Dgpg.passphrase="${{ secrets.MAVEN_GPG_PASSPHRASE }}"
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
