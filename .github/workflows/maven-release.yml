name: Maven Central Release

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Import GPG Key
        run: |
          gpg --batch --import <<- EOF
          ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          EOF
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf

      - name: Deploy SILENT (DEBUG MODE)
        run: |
          mvn clean deploy -X -e -B -DskipTests -Dgpg.passphrase="${{ secrets.MAVEN_GPG_PASSPHRASE }}"
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Deploy FULL (DEBUG MODE)
        run: |
          mvn clean deploy -X -e -B -DskipTests -Pfull-build -Dgpg.passphrase="${{ secrets.MAVEN_GPG_PASSPHRASE }}"
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}